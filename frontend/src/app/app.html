<div class="app-shell">
    <aside class="sidebar">
        <a class="brand" routerLink="/dashboard" aria-label="ResQ Command dashboard">
            <img src="/resq-logo.svg" alt="ResQ Command logo">
            <span>
                <strong>Multi Hazard Response Platform</strong>
                <small>Disaster Operations</small>
            </span>
        </a>

        <nav class="nav-links" aria-label="Main navigation">
            <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
                <span class="nav-icon">D</span>
                Dashboard
            </a>
            <a routerLink="/incidents" routerLinkActive="active">
                <span class="nav-icon">I</span>
                Incidents
            </a>
            <a routerLink="/persons" routerLinkActive="active">
                <span class="nav-icon">P</span>
                People
            </a>
            <a routerLink="/profile" routerLinkActive="active">
                <span class="nav-icon">U</span>
                Profile
            </a>
        </nav>

        <div class="system-card">
            <span class="pulse"></span>
            <div>
                <strong>Live mode</strong>
                <small>Auto-refresh enabled in operation screens</small>
            </div>
        </div>
    </aside>

    <main class="main-panel">
        <header class="topbar">
            <div>
                <span class="section-label">Emergency response console</span>
                <h1>Disaster Management System</h1>
            </div>
            <ng-container *ngIf="currentUser$ | async as currentUser; else guestLinks">
                <a class="operator-chip" routerLink="/profile">
                    <span class="operator-dot"></span>
                    {{ currentUser.name }}
                </a>
            </ng-container>
            <ng-template #guestLinks>
                <div class="auth-links">
                    <a routerLink="/signin">Sign In</a>
                    <a routerLink="/signup">Sign Up</a>
                </div>
            </ng-template>
        </header>

        <section class="content">
            <router-outlet></router-outlet>
        </section>
    </main>
</div>
