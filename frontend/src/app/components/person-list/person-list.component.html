<!-- src/app/components/person-list/person-list.component.html -->
<div class="person-container">
    <h1>Affected Persons Management</h1>
    
    <div class="add-person-form">
        <h2>Add New Person</h2>
        <div class="form-row">
            <input [(ngModel)]="newPerson.name" placeholder="Name" required>
            <input type="number" [(ngModel)]="newPerson.age" placeholder="Age" required>
            <input [(ngModel)]="newPerson.location" placeholder="Location" required>
            <select [(ngModel)]="newPerson.status">
                <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
            </select>
            <input [(ngModel)]="newPerson.contactNumber" placeholder="Contact Number">
            <button (click)="addPerson()" class="btn-add">Add Person</button>
        </div>
    </div>

    <div class="filters">
        <input [(ngModel)]="searchTerm" (ngModelChange)="applyFilters()" 
               placeholder="Search by name or location..." class="search-input">
        <select [(ngModel)]="selectedStatus" (ngModelChange)="applyFilters()" class="filter-select">
            <option value="">All Statuses</option>
            <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
        </select>
    </div>

    <div class="person-grid">
        <div *ngFor="let person of filteredPersons" class="person-card">
            <div class="person-header">
                <h3>{{ person.name }}</h3>
                <span class="status-badge" [style.background]="getStatusColor(person.status)">
                    {{ person.status }}
                </span>
            </div>
            <div class="person-details">
                <p><strong>Age:</strong> {{ person.age }}</p>
                <p><strong>Location:</strong> {{ person.location }}</p>
                <p *ngIf="person.contactNumber"><strong>Contact:</strong> {{ person.contactNumber }}</p>
                <p *ngIf="person.incidentId"><strong>Incident ID:</strong> {{ person.incidentId }}</p>
                <p *ngIf="person.lastUpdated"><strong>Last Updated:</strong> {{ person.lastUpdated | date:'medium' }}</p>
            </div>
            <div class="person-actions">
                <button (click)="startEdit(person)" class="btn-edit">Edit</button>
                <button (click)="deletePerson(person.id!)" class="btn-delete">Delete</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div *ngIf="editingPerson as person" class="modal-overlay">
        <div class="modal">
            <h2>Edit Person</h2>
            <div class="modal-form">
                <input [(ngModel)]="person.name" placeholder="Name">
                <input type="number" [(ngModel)]="person.age" placeholder="Age">
                <input [(ngModel)]="person.location" placeholder="Location">
                <select [(ngModel)]="person.status">
                    <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
                </select>
                <input [(ngModel)]="person.contactNumber" placeholder="Contact Number">
            </div>
            <div class="modal-actions">
                <button (click)="saveEdit()" class="btn-save">Save</button>
                <button (click)="cancelEdit()" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>
</div>
